name: Weekly Long-Form Video

on:
  schedule:
    # Every Sunday at 2:00 PM IST = 8:30 AM UTC
    - cron: "30 8 * * 0"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (script only, no video)"
        type: boolean
        default: false

jobs:
  create-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # longer timeout for 10-20 min videos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation fonts-dejavu-core imagemagick

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Long-Form Video Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python main.py --long-form --dry-run
          else
            python main.py --long-form
          fi

      - name: Commit topic history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add long_topic_history.json
          git diff --cached --quiet || git commit -m "Update long-form topic history [skip ci]"
          git push
