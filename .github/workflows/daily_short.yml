name: Daily YouTube Short

on:
  schedule:
    # 8:00 PM IST = 2:30 PM UTC
    - cron: "30 14 * * *"

  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  create-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation imagemagick

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip show moviepy
          python -c "try:
            from moviepy.editor import VideoFileClip; v='1.x'
          except ImportError:
            from moviepy import VideoFileClip; v='2.x'
          print(f'moviepy {v} OK')"

      - name: Run YouTube Shorts Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python main.py

      - name: Commit topic history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topic_history.json
          git diff --cached --quiet || git commit -m "Update topic history [skip ci]"
          git push
